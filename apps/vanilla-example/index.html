<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashia Pay — Vanilla JS Example</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #F9FAFB;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        background: #fff;
        border-radius: 16px;
        padding: 36px 40px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        margin: 20px;
      }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
      .subtitle { color: #6B7280; font-size: 14px; margin-bottom: 28px; }
      .product {
        background: #F9FAFB;
        border: 1px solid #E5E7EB;
        border-radius: 12px;
        padding: 16px 18px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .product-name { font-weight: 700; font-size: 16px; }
      .product-desc { color: #6B7280; font-size: 13px; margin-top: 2px; }
      .product-price { font-weight: 800; font-size: 20px; color: #4F46E5; }
      #pay-container { margin-bottom: 16px; }
      #status {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        display: none;
      }
      #status.success { display: block; background: #ECFDF5; color: #065F46; border: 1px solid #6EE7B7; }
      #status.error   { display: block; background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
      code {
        background: #F3F4F6;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>⚡ Cashia Pay</h1>
      <p class="subtitle">Vanilla JS / ES module example using <code>@cashia/pay-sdk</code></p>

      <div class="product">
        <div>
          <div class="product-name">🎟 Event Ticket</div>
          <div class="product-desc">Annual Developer Summit 2025</div>
        </div>
        <div class="product-price">KES 1,500.00</div>
      </div>

      <div id="pay-container"></div>
      <div id="status"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
